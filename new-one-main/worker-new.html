<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkMandi - मजदूर रजिस्ट्रेशन</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        /* Fast Loading - Minimal CSS */
        body {
            font-family: 'Noto Sans Devanagari', -apple-system, BlinkMacSystemFont, sans-serif;
            background: #ffffff;
            min-height: 100vh;
            color: #1a1a1a;
            line-height: 1.4;
        }

        /* Optimized Hero Section */
        .hero-section {
            position: relative;
            width: 100%;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #ffffff;
            overflow: hidden;
            background: url('hero.png') center/cover no-repeat;
        }

        .hero-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.4);
            z-index: 2;
        }

        .hero-content {
            position: relative;
            z-index: 3;
            max-width: 600px;
            padding: 20px;
        }

        .hero-title {
            font-size: clamp(24px, 5vw, 40px);
            font-weight: 700;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .hero-subtitle {
            font-size: clamp(16px, 3vw, 18px);
            margin-bottom: 25px;
            color: rgba(255, 255, 255, 0.9);
        }

        /* Fast Language Buttons */
        .language-selector {
            margin-bottom: 30px;
        }

        .language-label {
            font-size: clamp(16px, 3.5vw, 20px);
            font-weight: 600;
            margin-bottom: 15px;
            color: #ffffff;
        }

        .language-buttons {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            margin-bottom: 25px;
        }

        .lang-btn {
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid rgba(255, 255, 255, 0.3);
            color: #ffffff;
            padding: 20px 15px;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 5px;
            font-size: clamp(16px, 3.5vw, 20px);
            font-weight: 600;
            min-height: 70px;
        }

        .lang-btn:hover {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.25);
        }

        .lang-btn.active {
            background: #1a73e8;
            border-color: #1a73e8;
            transform: scale(1.02);
        }

        .lang-text {
            font-size: clamp(18px, 4vw, 24px);
            font-weight: 700;
        }

        .lang-sub {
            font-size: clamp(12px, 2.5vw, 14px);
            opacity: 0.85;
        }

        /* Fast Start Button */
        .start-btn {
            background: #28a745;
            color: #ffffff;
            border: none;
            padding: 20px 40px;
            font-size: clamp(18px, 3.5vw, 22px);
            font-weight: 700;
            border-radius: 12px;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 12px;
            min-height: 60px;
        }

        .start-btn:hover {
            background: #218838;
            transform: translateY(-2px);
        }

        /* Fast Form */
        .worker-form-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 1000;
        }

        .form-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            max-width: 450px;
            width: 90%;
            max-height: 90vh;
            overflow-y: auto;
        }

        .form-title {
            font-size: clamp(20px, 4vw, 28px);
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 25px;
            text-align: center;
        }

        .form-step {
            display: block;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: clamp(14px, 3vw, 18px);
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .form-input {
            width: 100%;
            padding: 15px 20px;
            font-size: clamp(14px, 3vw, 18px);
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            background: #f8f9fa;
            outline: none;
            transition: border-color 0.2s ease;
        }

        .input-with-voice {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .voice-btn {
            background: #f8f9fa;
            border: 2px solid #e1e8ed;
            border-radius: 12px;
            padding: 15px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            min-width: 50px;
            height: 50px;
        }

        .voice-btn:hover {
            background: #e8f0fe;
            border-color: #1a73e8;
        }

        .voice-btn.listening {
            background: #1a73e8;
            border-color: #1a73e8;
            color: white;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
            100% { opacity: 1; }
        }

        .voice-btn i {
            font-size: 18px;
        }

        .form-input:focus {
            border-color: #1a73e8;
            background: white;
        }

        .upload-area {
            width: 100%;
            padding: 25px 15px;
            border: 2px dashed #dee2e6;
            border-radius: 12px;
            background: #f8f9fa;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .upload-area:hover {
            border-color: #1a73e8;
            background: #e8f0fe;
        }

        .verification-header {
            text-align: center;
            margin-bottom: 25px;
            padding-bottom: 15px;
            border-bottom: 2px solid #e9ecef;
        }

        .security-message {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-size: clamp(12px, 2.5vw, 14px);
            color: #28a745;
            font-weight: 500;
        }

        .form-actions {
            display: flex;
            gap: 12px;
            margin-top: 25px;
        }

        .btn {
            flex: 1;
            padding: 15px 20px;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 600;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-secondary {
            background: #e9ecef;
            color: #6c757d;
        }

        .btn-primary {
            background: #1a73e8;
            color: white;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        /* Worker Profile Styles */
        .worker-profile {
            position: relative;
            z-index: 3;
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
            animation: fadeInUp 1.2s ease-out;
        }

        .profile-container {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 25px;
            padding: 40px 30px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }

        .profile-header {
            display: flex;
            align-items: center;
            gap: 25px;
            margin-bottom: 35px;
            padding-bottom: 25px;
            border-bottom: 2px solid #e9ecef;
        }

        .profile-avatar {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: white;
            font-size: 32px;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
            flex-shrink: 0;
        }

        .profile-info {
            flex: 1;
            min-width: 0;
        }

        .profile-name {
            font-size: clamp(24px, 5vw, 32px);
            font-weight: 700;
            color: #2c3e50;
            margin-bottom: 8px;
        }

        .profile-work-type {
            font-size: clamp(16px, 3.5vw, 20px);
            color: #6c757d;
            margin-bottom: 12px;
        }

        .verified-badge-profile {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #28a745, #20c997);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(40, 167, 69, 0.3);
        }

        .pending-badge {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: linear-gradient(135deg, #ffc107, #ff9800);
            color: white;
            padding: 8px 16px;
            border-radius: 20px;
            font-size: 14px;
            font-weight: 600;
            box-shadow: 0 4px 12px rgba(255, 193, 7, 0.3);
        }

        .profile-details {
            margin-bottom: 35px;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 15px;
            transition: all 0.3s ease;
        }

        .detail-item:hover {
            background: #e9ecef;
            transform: translateY(-2px);
        }

        .detail-item i {
            width: 40px;
            height: 40px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            flex-shrink: 0;
        }

        .detail-item div {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 4px;
        }

        .detail-label {
            font-size: clamp(12px, 2.5vw, 14px);
            color: #6c757d;
            font-weight: 500;
        }

        .detail-value {
            font-size: clamp(16px, 3.5vw, 18px);
            color: #2c3e50;
            font-weight: 600;
        }

        .profile-actions {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
        }

        .profile-btn {
            flex: 1;
            min-width: 140px;
            padding: 15px 20px;
            font-size: clamp(14px, 3vw, 16px);
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .profile-btn.primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .profile-btn.primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(102, 126, 234, 0.4);
        }

        .profile-btn.secondary {
            background: #e9ecef;
            color: #6c757d;
        }

        .profile-btn.secondary:hover {
            background: #dee2e6;
            transform: translateY(-2px);
        }

        /* Mobile Fast */
        @media (max-width: 768px) {
            .language-buttons {
                grid-template-columns: 1fr;
                gap: 12px;
            }
            
            .form-container {
                padding: 20px;
            }

            .profile-container {
                padding: 30px 20px;
                margin: 0 10px;
            }

            .profile-header {
                flex-direction: column;
                text-align: center;
                gap: 20px;
            }

            .profile-avatar {
                width: 70px;
                height: 70px;
                font-size: 28px;
            }

            .profile-details {
                margin-bottom: 30px;
            }

            .detail-item {
                padding: 12px 15px;
                gap: 15px;
            }

            .detail-item i {
                width: 35px;
                height: 35px;
                font-size: 16px;
            }

            .profile-actions {
                flex-direction: column;
            }

            .profile-btn {
                min-width: 100%;
            }
        }
    </style>
</head>
<body>
    <!-- Hero Section -->
    <section class="hero-section">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 class="hero-title" id="heroTitle">काम ढूंढें आसान तरीके से</h1>
            <p class="hero-subtitle" id="heroSubtitle">अपनी कौशल और अनुभव के साथ अच्छा काम पाएं, और अपने जीवन को बेहतर बनाएं</p>
            
            <!-- Language Selection -->
            <div class="language-selector">
                <p class="language-label">भाषा चुनें / Select Language:</p>
                <div class="language-buttons">
                    <button class="lang-btn active" data-lang="hi" onclick="selectLanguage('hi')">
                        <span class="lang-text">हिन्दी</span>
                        <span class="lang-sub">Hindi</span>
                    </button>
                    <button class="lang-btn" data-lang="en" onclick="selectLanguage('en')">
                        <span class="lang-text">English</span>
                        <span class="lang-sub">English</span>
                    </button>
                    <button class="lang-btn" data-lang="ta" onclick="selectLanguage('ta')">
                        <span class="lang-text">தமிழ்</span>
                        <span class="lang-sub">Tamil</span>
                    </button>
                    <button class="lang-btn" data-lang="bn" onclick="selectLanguage('bn')">
                        <span class="lang-text">বাংলা</span>
                        <span class="lang-sub">Bengali</span>
                    </button>
                </div>
            </div>
            
            <button class="start-btn" onclick="showWorkerForm()">
                <i class="fas fa-play"></i>
                <span id="startBtnText">Start</span>
            </button>
        </div>
    </section>

    <!-- Fast Worker Form -->
    <div class="worker-form-container" id="workerForm">
        <div class="form-container">
            <h2 class="form-title" id="formTitle">Worker Registration</h2>
            
            <!-- Step 1 -->
            <div class="form-step" id="step1">
                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-user"></i>
                        <span id="nameLabel">Full Name</span>
                    </label>
                    <div class="input-with-voice">
                        <input type="text" id="workerName" class="form-input" placeholder="Enter your full name">
                        <button type="button" class="voice-btn" onclick="startVoiceInput('workerName')" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-tools"></i>
                        <span id="workTypeLabel">Work Type</span>
                    </label>
                    <select id="workType" class="form-input">
                        <option value="">Select your work type</option>
                        <option value="mason">Mason</option>
                        <option value="carpenter">Carpenter</option>
                        <option value="electrician">Electrician</option>
                        <option value="plumber">Plumber</option>
                        <option value="painter">Painter</option>
                        <option value="welder">Welder</option>
                        <option value="helper">Helper</option>
                        <option value="driver">Driver</option>
                        <option value="mechanic">Mechanic</option>
                        <option value="other">Other</option>
                    </select>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-map-marker-alt"></i>
                        <span id="cityLabel">City</span>
                    </label>
                    <div class="input-with-voice">
                        <input type="text" id="city" class="form-input" placeholder="Enter your city">
                        <button type="button" class="voice-btn" onclick="startVoiceInput('city')" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-phone"></i>
                        <span id="phoneLabel">Phone Number</span>
                    </label>
                    <div class="input-with-voice">
                        <input type="tel" id="phone" class="form-input" placeholder="Enter your phone number">
                        <button type="button" class="voice-btn" onclick="startVoiceInput('phone')" title="Voice Input">
                            <i class="fas fa-microphone"></i>
                        </button>
                    </div>
                </div>

                <div class="form-actions">
                    <button class="btn btn-primary" onclick="goToVerification()">
                        <i class="fas fa-arrow-right"></i>
                        <span id="nextBtnText">Next</span>
                    </button>
                </div>
            </div>

            <!-- Step 2 -->
            <div class="form-step" id="step2" style="display: none;">
                <div class="verification-header">
                    <h3 id="verificationTitle">Complete Verification (Optional)</h3>
                    <p class="security-message">
                        <i class="fas fa-shield-alt"></i>
                        <span id="securityText">Your data is secure and only used for verification</span>
                    </p>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-camera"></i>
                        <span id="photoLabel">Upload Profile Photo</span>
                    </label>
                    <div class="upload-area" onclick="document.getElementById('profilePhotoInput').click()">
                        <i class="fas fa-cloud-upload-alt"></i>
                        <span id="photoPlaceholder">Click to upload photo</span>
                        <input type="file" id="profilePhotoInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-id-card"></i>
                        <span id="idLabel">Upload ID Proof (Aadhaar or any ID)</span>
                    </label>
                    <div class="upload-area" onclick="document.getElementById('idProofInput').click()">
                        <i class="fas fa-file-upload"></i>
                        <span id="idPlaceholder">Click to upload ID proof</span>
                        <input type="file" id="idProofInput" accept="image/*" style="display: none;">
                    </div>
                </div>

                <div class="form-group">
                    <label class="form-label">
                        <i class="fas fa-briefcase"></i>
                        <span id="experienceLabel">Select Experience</span>
                    </label>
                    <select id="experience" class="form-input">
                        <option value="">Select your experience</option>
                        <option value="0-1">0-1 years</option>
                        <option value="1-3">1-3 years</option>
                        <option value="3-5">3-5 years</option>
                        <option value="5-10">5-10 years</option>
                        <option value="10+">10+ years</option>
                    </select>
                </div>

                <div class="form-actions">
                    <button class="btn btn-secondary" onclick="goToBasicInfo()">
                        <i class="fas fa-arrow-left"></i>
                        <span id="backBtnText">Back</span>
                    </button>
                    <button class="btn btn-primary" onclick="submitVerification()">
                        <i class="fas fa-check"></i>
                        <span id="submitBtnText">Submit Verification</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script>
        // Fast Language System
        const languageContent = {
            hi: {
                title: 'काम ढूंढें आसान तरीके से',
                subtitle: 'अपनी कौशल और अनुभव के साथ अच्छा काम पाएं, और अपने जीवन को बेहतर बनाएं',
                startBtn: 'शुरू करें',
                formTitle: 'कामढूंढना पंजीकरण',
                verificationTitle: 'सत्यापन पूर्ण करें (वैकल्पिक)',
                securityText: 'आपका डेटा सुरक्षित है और केवल सत्यापन के लिए उपयोग किया जाता है',
                nameLabel: 'पूरा नाम',
                workTypeLabel: 'काम प्रकार',
                cityLabel: 'शहर',
                phoneLabel: 'फोन नंबर',
                photoLabel: 'प्रोफाइल फोटो अपलोड करें',
                idLabel: 'आईडी प्रूफ अपलोड करें (आधार या कोई भी आईडी)',
                experienceLabel: 'अनुभव चुनें',
                nextBtn: 'अगला',
                backBtn: 'वापस',
                submitBtn: 'सत्यापन जमा करें'
            },
            en: {
                title: 'Find Work Easily',
                subtitle: 'Connect with employers and find the best job opportunities for your skills',
                startBtn: 'Start',
                formTitle: 'Worker Registration',
                verificationTitle: 'Complete Verification (Optional)',
                securityText: 'Your data is secure and only used for verification',
                nameLabel: 'Full Name',
                workTypeLabel: 'Work Type',
                cityLabel: 'City',
                phoneLabel: 'Phone Number',
                photoLabel: 'Upload Profile Photo',
                idLabel: 'Upload ID Proof (Aadhaar or any ID)',
                experienceLabel: 'Select Experience',
                nextBtn: 'Next',
                backBtn: 'Back',
                submitBtn: 'Submit Verification'
            },
            ta: {
                title: 'வேலை எளிது கண்டுபவர்',
                subtitle: 'முதலாளர்களுடன் இணைந்து சிறந்த வேலைவைகளைப் பெறுங்கள், உங்கள் வாழ்க்கையை மேம்படுங்கள்',
                startBtn: 'தொடங்கவும்',
                formTitle: 'வேலையாளர் பதிவு',
                verificationTitle: 'சரிபார்ப்பை முடிக்கவும் (விருப்பம்)',
                securityText: 'உங்கள் தரவு பாதுகாப்பாக உள்ளது மற்றும் சரிபார்ப்புக்கு மட்டுமே பயன்படுத்தப்படுகிறது',
                nameLabel: 'முழுப் பெயர்',
                workTypeLabel: 'வேலை வகை',
                cityLabel: 'நகரம்',
                phoneLabel: 'தொலைப்பர் எண்',
                photoLabel: 'சுயவிவரப் புகைப்படத்தை பதிவேற்று',
                idLabel: 'அடையாள ஆதாரத்தை பதிவேற்று (ஆதார் அல்லது எந்த அடையாளம்)',
                experienceLabel: 'அனுபவத்தைத் தேர்ந்தெடு',
                nextBtn: 'அடுத்தது',
                backBtn: 'திரும்பு',
                submitBtn: 'சரிபார்ப்பை சமர்ப்பு'
            },
            bn: {
                title: 'সহজে কাজ খুঁজুন',
                subtitle: 'নিযোগ্যদের সাথে যোগাযোগ করুন এবং আপনার দক্ষতাকে একটিভ করুন',
                startBtn: 'শুরু করুন',
                formTitle: 'শ্রমিক নিবন্ধন',
                verificationTitle: 'যাচাই সম্পূর্ণ করুন (ঐচ্ছিক)',
                securityText: 'আপনার ডেটা নিরাপদ এবং শুধুমাত্র যাচাইয়ের জন্য ব্যবহৃত হয়',
                nameLabel: 'পূর্ণ নাম',
                workTypeLabel: 'কাজের ধরন',
                cityLabel: 'শহর',
                phoneLabel: 'ফোন নম্বর',
                photoLabel: 'প্রোফাইল ছবি আপলোড করুন',
                idLabel: 'আইডি প্রুফ আপলোড করুন (আধার বা কোনো আইডি)',
                experienceLabel: 'অভিজ্ঞতা নির্বাচন করুন',
                nextBtn: 'পরবর্তী',
                backBtn: 'ফিরে যান',
                submitBtn: 'যাচাই জমা দিন'
            }
        };

        let currentLanguage = localStorage.getItem('selectedLanguage') || 'hi';

        // Fast Language Apply
        function applyLanguage(lang) {
            const content = languageContent[lang];
            document.getElementById('heroTitle').textContent = content.title;
            document.getElementById('heroSubtitle').textContent = content.subtitle;
            document.getElementById('startBtnText').textContent = content.startBtn;
            document.getElementById('formTitle').textContent = content.formTitle;
            document.getElementById('verificationTitle').textContent = content.verificationTitle;
            document.getElementById('securityText').textContent = content.securityText;
            document.getElementById('nameLabel').textContent = content.nameLabel;
            document.getElementById('workTypeLabel').textContent = content.workTypeLabel;
            document.getElementById('cityLabel').textContent = content.cityLabel;
            document.getElementById('phoneLabel').textContent = content.phoneLabel;
            document.getElementById('photoLabel').textContent = content.photoLabel;
            document.getElementById('idLabel').textContent = content.idLabel;
            document.getElementById('experienceLabel').textContent = content.experienceLabel;
            document.getElementById('nextBtnText').textContent = content.nextBtn;
            document.getElementById('backBtnText').textContent = content.backBtn;
            document.getElementById('submitBtnText').textContent = content.submitBtn;
        }

        // Fast Language Selection
        function selectLanguage(lang) {
            document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.remove('active'));
            document.querySelector(`[data-lang="${lang}"]`).classList.add('active');
            localStorage.setItem('selectedLanguage', lang);
            currentLanguage = lang;
            applyLanguage(lang);
        }

        // Fast Form Functions
        function showWorkerForm() {
            document.getElementById('workerForm').style.display = 'flex';
        }

        function hideWorkerForm() {
            document.getElementById('workerForm').style.display = 'none';
        }

        function goToVerification() {
            if (!document.getElementById('workerName').value || !document.getElementById('workType').value || !document.getElementById('city').value || !document.getElementById('phone').value) {
                alert('Please fill in all required fields');
                return;
            }
            document.getElementById('step1').style.display = 'none';
            document.getElementById('step2').style.display = 'block';
        }

        function goToBasicInfo() {
            document.getElementById('step2').style.display = 'none';
            document.getElementById('step1').style.display = 'block';
        }

        function submitVerification() {
            const formData = {
                name: document.getElementById('workerName').value,
                work_type: document.getElementById('workType').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value,
                experience: document.getElementById('experience').value,
                verified: true
            };

            const profilePhoto = document.getElementById('profilePhotoInput').files[0];
            const idProof = document.getElementById('idProofInput').files[0];

            // Save worker data to localStorage
            localStorage.setItem('workerData', JSON.stringify(formData));
            
            // Save to Supabase
            dbOperations.saveWorker(formData).then(result => {
                if (result.success) {
                    console.log('Worker saved to Supabase:', result.data);
                    console.log('Profile photo:', profilePhoto);
                    console.log('ID proof:', idProof);

                    // Show verified badge and redirect to profile
                    const content = languageContent[currentLanguage];
                    alert(content.verificationSuccess || 'Verification submitted successfully! You are now a verified worker.');
                    
                    hideWorkerForm();
                    showWorkerProfile(formData);
                } else {
                    console.error('Failed to save worker to Supabase:', result.error);
                    const content = languageContent[currentLanguage];
                    alert(content.saveError || 'Failed to save data. Please try again.');
                }
            });
        }

        function submitWorkerForm() {
            const formData = {
                name: document.getElementById('workerName').value,
                work_type: document.getElementById('workType').value,
                city: document.getElementById('city').value,
                phone: document.getElementById('phone').value,
                experience: 'Not specified',
                verified: false
            };

            // Save worker data to localStorage
            localStorage.setItem('workerData', JSON.stringify(formData));

            // Simple validation
            if (!formData.name || !formData.work_type || !formData.city || !formData.phone) {
                const content = languageContent[currentLanguage];
                alert(content.validationError || 'Please fill in all required fields');
                return;
            }

            // Save to Supabase
            dbOperations.saveWorker(formData).then(result => {
                if (result.success) {
                    console.log('Worker saved to Supabase:', result.data);
                    const content = languageContent[currentLanguage];
                    alert(content.registrationSuccess || 'Registration submitted successfully! We will contact you soon.');
                    
                    hideWorkerForm();
                    showWorkerProfile(formData);
                } else {
                    console.error('Failed to save worker to Supabase:', result.error);
                    const content = languageContent[currentLanguage];
                    alert(content.saveError || 'Failed to save data. Please try again.');
                }
            });
        }

        // Show Worker Profile
        function showWorkerProfile(workerData) {
            // Hide hero content and show profile
            document.querySelector('.hero-content').style.display = 'none';
            
            // Create profile section
            const profileSection = document.createElement('div');
            profileSection.className = 'worker-profile';
            profileSection.innerHTML = `
                <div class="profile-container">
                    <div class="profile-header">
                        <div class="profile-avatar">
                            <i class="fas fa-user"></i>
                        </div>
                        <div class="profile-info">
                            <h2 class="profile-name">${workerData.name}</h2>
                            <p class="profile-work-type">${getWorkTypeLabel(workerData.work_type)}</p>
                            ${workerData.verified ? '<span class="verified-badge-profile"><i class="fas fa-check-circle"></i> Verified Worker</span>' : '<span class="pending-badge"><i class="fas fa-clock"></i> Pending Verification</span>'}
                        </div>
                    </div>
                    
                    <div class="profile-details">
                        <div class="detail-item">
                            <i class="fas fa-map-marker-alt"></i>
                            <div>
                                <span class="detail-label">Location</span>
                                <span class="detail-value">${workerData.city}</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-phone"></i>
                            <div>
                                <span class="detail-label">Phone</span>
                                <span class="detail-value">${workerData.phone}</span>
                            </div>
                        </div>
                        <div class="detail-item">
                            <i class="fas fa-briefcase"></i>
                            <div>
                                <span class="detail-label">Experience</span>
                                <span class="detail-value">${workerData.experience || 'Not specified'}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div class="profile-actions">
                        <button class="profile-btn primary" onclick="viewJobs()">
                            <i class="fas fa-search"></i>
                            Find Jobs
                        </button>
                        <button class="profile-btn secondary" onclick="editProfile()">
                            <i class="fas fa-edit"></i>
                            Edit Profile
                        </button>
                    </div>
                </div>
            `;
            
            // Add profile to hero section
            document.querySelector('.hero-section').appendChild(profileSection);
        }

        // Get work type label
        function getWorkTypeLabel(work_type) {
            const labels = {
                'mason': 'Mason',
                'carpenter': 'Carpenter',
                'electrician': 'Electrician',
                'plumber': 'Plumber',
                'painter': 'Painter',
                'welder': 'Welder',
                'helper': 'Helper',
                'driver': 'Driver',
                'mechanic': 'Mechanic',
                'other': 'Other'
            };
            return labels[work_type] || work_type;
        }

        // View Jobs
        function viewJobs() {
            // Redirect to jobs page
            window.location.href = 'jobs.html';
        }

        // Edit Profile
        function editProfile() {
            // Show form again for editing
            document.querySelector('.worker-profile').remove();
            showWorkerForm();
            
            // Pre-fill form with existing data
            const workerData = JSON.parse(localStorage.getItem('workerData') || '{}');
            if (workerData.name) document.getElementById('workerName').value = workerData.name;
            if (workerData.work_type) document.getElementById('workType').value = workerData.work_type;
            if (workerData.city) document.getElementById('city').value = workerData.city;
            if (workerData.phone) document.getElementById('phone').value = workerData.phone;
        }

        // Fast Initialize
        window.addEventListener('load', () => {
            applyLanguage(currentLanguage);
            document.querySelector(`[data-lang="${currentLanguage}"]`).classList.add('active');
        });

        // Voice Input Functionality
        let recognition;
        let currentInputField = null;

        // Initialize speech recognition
        function initSpeechRecognition() {
            if (!('webkitSpeechRecognition' in window) && !('SpeechRecognition' in window)) {
                console.warn('Speech recognition not supported');
                return false;
            }

            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            
            // Set language based on user selection
            const langMap = {
                'hi': 'hi-IN',
                'en': 'en-US',
                'ta': 'ta-IN',
                'bn': 'bn-IN'
            };
            recognition.lang = langMap[currentLanguage] || 'en-US';
            
            recognition.continuous = false;
            recognition.interimResults = true;
            recognition.maxAlternatives = 1;

            recognition.onstart = function() {
                console.log('Voice recognition started');
                if (currentInputField) {
                    const button = document.querySelector(`button[onclick="startVoiceInput('${currentInputField}')"]`);
                    if (button) {
                        button.classList.add('listening');
                        button.innerHTML = '<i class="fas fa-microphone-slash"></i>';
                        button.title = 'Listening...';
                    }
                }
            };

            recognition.onresult = function(event) {
                const result = event.results[0][0].transcript;
                if (currentInputField) {
                    const input = document.getElementById(currentInputField);
                    if (input) {
                        input.value = result;
                    }
                }
            };

            recognition.onerror = function(event) {
                console.error('Speech recognition error:', event.error);
                let errorMessage = 'Voice recognition failed';
                
                if (event.error === 'not-allowed') {
                    errorMessage = 'Microphone access denied. Please allow microphone access.';
                } else if (event.error === 'no-speech') {
                    errorMessage = 'No speech detected. Please try again.';
                } else if (event.error === 'network') {
                    errorMessage = 'Network error. Please check your connection.';
                }
                
                alert(errorMessage);
                stopListening();
            };

            recognition.onend = function() {
                console.log('Voice recognition ended');
                stopListening();
            };

            return true;
        }

        // Start voice input for a specific field
        function startVoiceInput(fieldId) {
            currentInputField = fieldId;
            
            // Initialize recognition if not already done
            if (!recognition) {
                if (!initSpeechRecognition()) {
                    alert('Voice input is not supported in your browser. Please try using Chrome or Edge.');
                    return;
                }
            }
            
            // Update language setting before starting
            const langMap = {
                'hi': 'hi-IN',
                'en': 'en-US',
                'ta': 'ta-IN',
                'bn': 'bn-IN'
            };
            recognition.lang = langMap[currentLanguage] || 'en-US';
            
            try {
                recognition.start();
            } catch (error) {
                console.error('Failed to start recognition:', error);
                if (error.name === 'InvalidStateError') {
                    recognition.stop();
                    setTimeout(() => {
                        recognition.start();
                    }, 100);
                }
            }
        }

        // Stop listening and reset UI
        function stopListening() {
            if (currentInputField) {
                const button = document.querySelector(`button[onclick="startVoiceInput('${currentInputField}')"]`);
                if (button) {
                    button.classList.remove('listening');
                    button.innerHTML = '<i class="fas fa-microphone"></i>';
                    button.title = 'Voice Input';
                }
            }
            currentInputField = null;
        }

        // Close form on outside click
        document.getElementById('workerForm').addEventListener('click', (e) => {
            if (e.target.id === 'workerForm') {
                hideWorkerForm();
            }
        });
    </script>
